name : Continuous Integration
on :
  push :
    branches : 
      - dev
      - main
jobs :
  build :
    runs-on : ubuntu latest

    steps :
      - uses : actions/checkout@v4
      - uses : actions/setup-java@v4
        with :
        distribution: temurin
        java-version : '17'
        cache: maven

      - name: Build Project
        run: mvn -B -DskipTests clean package